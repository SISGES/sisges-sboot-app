services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sisges
    volumes:
      - sisges-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sisges"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sisges
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SECURITY_JWT_SECRET_KEY: docker-compose-dev-secret-min-32-chars-xx
      SISGES_UPLOAD_DIR: /app/uploads
    volumes:
      - sisges-uploads:/app/uploads

  frontend:
    build:
      context: ../sisges-react-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  sisges-pgdata:
  sisges-uploads:
