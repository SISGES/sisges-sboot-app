spring.application.name=sisges

# Carrega secrets locais (se existir) - application-local.properties está no .gitignore
spring.config.import=optional:file:./application-local.properties

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ballast.proxy.rlwy.net:43948/railway}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:oOFSxaDLAMPrxlQRSnWLWEvHdUgZLpgH}

spring.jpa.properties.hibernate.default_schema=sisges
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.default-schema=sisges
spring.flyway.locations=classpath:db/migration

# Chave JWT: definir SECURITY_JWT_SECRET_KEY em produção (mín. 32 caracteres)
security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY:default-dev-secret-key-min-32-chars}
security.jwt.expiration-time=${SECURITY_JWT_EXPIRATION_TIME:3600000}

# Upload de arquivos (disco local; caminho configurável em produção)
sisges.upload.dir=${SISGES_UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB